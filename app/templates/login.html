<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign In — PayFlow</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <style>
    :root { --bg:#07080f;--surface:#0f1018;--surface2:#181a26;--border:#252737;--border2:#2e3148;--accent:#00e5a0;--text:#eeeef5;--muted:#5a5a78;--text2:#a8a8c0;--danger:#ff4d6d; }
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem;-webkit-font-smoothing:antialiased;}
    .wrap{width:100%;max-width:400px;}
    .logo{text-align:center;margin-bottom:2rem;}
    .logo a{font-family:'Syne',sans-serif;font-weight:800;font-size:1.6rem;color:var(--accent);text-decoration:none;}
    .logo a span{color:var(--text);}
    .logo p{color:var(--muted);font-size:0.85rem;margin-top:0.4rem;}
    .card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:1.75rem;}
    .form-group{margin-bottom:1.1rem;}
    label{display:flex;align-items:center;gap:.35rem;font-size:.82rem;font-weight:500;color:var(--text2);margin-bottom:.4rem;}
    label i{width:13px;height:13px;color:var(--muted);}
    input{width:100%;background:var(--surface2);border:1px solid var(--border2);color:var(--text);border-radius:8px;padding:.6rem .9rem;font-family:'DM Sans',sans-serif;font-size:.9rem;outline:none;transition:border-color .2s,box-shadow .2s;}
    input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(0,229,160,.08);}
    input::placeholder{color:var(--muted);}
    .btn{display:flex;align-items:center;justify-content:center;gap:.4rem;width:100%;padding:.7rem;background:var(--accent);color:#000;border:none;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:.92rem;font-weight:600;cursor:pointer;text-decoration:none;transition:all .15s;}
    .btn:hover{background:#00cc90;box-shadow:0 0 20px rgba(0,229,160,.2);}
    .footer-link{text-align:center;margin-top:1.25rem;font-size:.85rem;color:var(--muted);}
    .footer-link a{color:var(--accent);text-decoration:none;}
    .alert{display:flex;align-items:center;gap:.5rem;padding:.75rem 1rem;border-radius:8px;margin-bottom:1rem;font-size:.85rem;background:rgba(255,77,109,.1);border:1px solid rgba(255,77,109,.2);color:var(--danger);}
  </style>
</head>
<body>
<div class="wrap">
  <div class="logo">
    <a href="{{ url_for('auth.index') }}">Pay<span>Flow</span></a>
    <p>Sign in to your business account</p>
  </div>
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for category, message in messages %}
      <div class="alert"><i data-lucide="alert-circle" style="width:15px;height:15px;flex-shrink:0;"></i>{{ message }}</div>
    {% endfor %}
  {% endwith %}
  <div class="card">
    <form method="POST">
      <div class="form-group">
        <label><i data-lucide="mail"></i> Email address</label>
        <input type="email" name="email" placeholder="you@business.com" required autofocus />
      </div>
      <div class="form-group" style="margin-bottom:1.5rem;">
        <label><i data-lucide="lock"></i> Password</label>
        <input type="password" name="password" placeholder="••••••••" required />
      </div>
      <button type="submit" class="btn"><i data-lucide="log-in" style="width:16px;height:16px;"></i> Sign In</button>
    </form>
  </div>
  <div class="footer-link">No account? <a href="{{ url_for('auth.register') }}">Register your business</a></div>
</div>
<script>lucide.createIcons();</script>
</body>
</html>
