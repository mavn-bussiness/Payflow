services:
  - type: web
    name: payflow
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn run:app
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: payflow_db_dwna
          property: connectionString
      - key: SECRET_KEY
        sync: false
      - key: MOMO_SUBSCRIPTION_KEY
        sync: false
      - key: MOMO_API_USER
        sync: false
      - key: MOMO_API_KEY
        sync: false
      - key: MOMO_ENVIRONMENT
        value: production
      - key: MOMO_CURRENCY
        value: UGX
      - key: MOMO_BASE_URL
        value: https://momodeveloper.mtn.com
      - key: FLASK_APP
        value: run.py
      - key: FLASK_ENV
        value: production

databases:
  - name: payflow_db_dwna
    plan: free
