services:
  - type: web
    name: payflow
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn run:app
    releaseCommand: flask db upgrade
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: payflow_db_dwna
          property: connectionString
      - key: SECRET_KEY
        sync: false
      - key: FLW_PUBLIC_KEY
        sync: false
      - key: FLW_SECRET_KEY
        sync: false
      - key: FLW_ENCRYPTION_KEY
        sync: false
      - key: FLW_WEBHOOK_SECRET
        sync: false
      - key: FLASK_APP
        value: run.py
      - key: FLASK_ENV
        value: production

databases:
  - name: PayFlow_db
    plan: free
